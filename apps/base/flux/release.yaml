---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: flux-operator
  values:
    web:
      ingress:
        enabled: true
    resources:
      limits:
        memory: 256Mi
      requests:
        memory: 256Mi
    serviceMonitor:
      create: true
      labels:
        release: kps
