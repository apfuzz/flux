---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  interval: 15m
  values:
    web:
      config:
        baseURL: https://flux.gangsterkitties.com
      networkPolicy:
        create: false
      ingress:
        annotations:
          external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
        hosts:
          - host: flux.gangsterkitties.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - flux.gangsterkitties.com
