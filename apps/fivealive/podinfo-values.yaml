---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  interval: 15m
  chart:
    spec:
      chart: podinfo
      version: 6.9.1
      sourceRef:
        kind: HelmRepository
        name: podinfo
  values:
    ingress:
      annotations:
        external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
      hosts:
        - host: podinfo.gangsterkitties.com
          paths:
            - path: /
              pathType: Prefix
