---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium
spec:
  dependsOn:
    - name: kps-crds
      namespace: monitoring
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: cilium
      version: "1.19.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    ingressController:
      enabled: true
      default: true
      loadbalancerMode: shared
      defaultSecretNamespace: cert-manager
      defaultSecretName: wildcard
    gatewayAPI:
      enabled: true
      enableAlpn: true
    encryption:
      enabled: true
      type: wireguard
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    ipam:
      mode: kubernetes
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: kps
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Cilium
    envoy:
      prometheus:
        serviceMonitor:
          enabled: true
          labels:
            release: kps
    operator:
      replicas: 1
      prometheus:
        serviceMonitor:
          enabled: true
          labels:
            release: kps
      dashboards:
        enabled: true
        annotations:
          grafana_folder: Cilium
    kubeProxyReplacement: true
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
