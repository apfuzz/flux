---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  # interval: 15m
  interval: 5m
  timeout: 5m
  chart:
    spec:
      chart: headlamp
      version: ">= 0.1.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
  driftDetection:
    mode: warn
  values:
    config:
      oidc:
        clientID: kubernetes
        clientSecret: kubernetes-secret
        issuerURL: https://dex.gangsterkitties.com/dex
        scopes: groups
      watchPlugins: true
    ingress:
      enabled: true
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 128Mi
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
