---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: reloader
      version: ">= 1.0.0"
      sourceRef:
        kind: HelmRepository
        name: reloader
  driftDetection:
    mode: enabled
  values: {}
