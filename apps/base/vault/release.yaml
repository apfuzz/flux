---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: vault
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: vault
  driftDetection:
    mode: enabled
  values:
    global:
      serverTelemetry:
        prometheusOperator: true
    injector:
      enabled: false
    server:
      ingress:
        enabled: true
      extraEnvironmentVars:
        VAULT_SEAL_TYPE: awskms
        AWS_REGION: us-east-1
      extraSecretEnvironmentVars:
        - envName: AWS_ACCESS_KEY_ID
          secretName: aws-vault
          secretKey: AWS_ACCESS_KEY_ID
        - envName: AWS_SECRET_ACCESS_KEY
          secretName: aws-vault
          secretKey: AWS_SECRET_ACCESS_KEY
        - envName: VAULT_AWSKMS_SEAL_KEY_ID
          secretName: aws-vault
          secretKey: VAULT_AWSKMS_SEAL_KEY_ID
      standalone:
        enabled: false
      ha:
        enabled: true
        raft:
          enabled: true
          config: |
            ui = true

            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              telemetry {
                unauthenticated_metrics_access = "true"
              }
            }

            storage "raft" {
              path = "/vault/data"
            }

            telemetry {
              prometheus_retention_time = "30s"
              disable_hostname = true
            }

            service_registration "kubernetes" {}
    ui:
      enabled: true
    serverTelemetry:
      serviceMonitor:
        enabled: true
        selectors:
          release: kps
