---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kps
  namespace: monitoring
spec:
  interval: 15m
  install:
    crds: Skip
  values:
    defaultRules:
      rules:
        kubeProxy: false
    alertmanager:
      config:
        route:
          receiver: 'slack'
      templateFiles:
        slack.tmpl: |-
          {{ define "__alertmanager" }}poptart{{ end }}

          {{/* Alertmanager Silence link */}}
          {{ define "__alert_silence_link" -}}
            {{ .ExternalURL }}/#/silences/new?filter=%7B
            {{- range .CommonLabels.SortedPairs -}}
              {{- if ne .Name "alertname" -}}
                {{- .Name }}%3D"{{- .Value -}}"%2C%20
              {{- end -}}
            {{- end -}}
            alertname%3D"{{- .CommonLabels.alertname -}}"%7D
          {{- end }}

          {{/* Severity of the alert */}}
          {{ define "__alert_severity" -}}
            {{- if eq .CommonLabels.severity "critical" -}}
              *Severity:* `Critical`
            {{- else if eq .CommonLabels.severity "warning" -}}
              *Severity:* `Warning`
            {{- else if eq .CommonLabels.severity "info" -}}
              *Severity:* `Info`
            {{- else -}}
              *Severity:* :question: {{ .CommonLabels.severity }}
            {{- end }}
          {{- end }}

          {{/* Title of the Slack alert */}}
          {{ define "slack.title" -}}
            [{{ .Status | toUpper -}}
            {{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{- end -}}
            ] {{ .CommonLabels.alertname }}
          {{- end }}

          {{/* Color of Slack attachment (appears as line next to alert )*/}}
          {{ define "slack.color" -}}
            {{ if eq .Status "firing" -}}
              {{ if eq .CommonLabels.severity "warning" -}}
                  warning
              {{- else if eq .CommonLabels.severity "critical" -}}
                  danger
              {{- else -}}
                  #439FE0
              {{- end -}}
            {{ else -}}
            good
            {{- end }}
          {{- end }}

          {{/* The text to display in the alert */}}
          {{ define "slack.text" -}}
            {{ template "__alert_severity" . }}
            {{- if (index .Alerts 0).Annotations.summary }}
              {{- "\n" -}}
              *Summary:* {{ (index .Alerts 0).Annotations.summary }}
            {{- end }}
            {{ range .Alerts }}
              {{- if .Annotations.description }}
                {{- "\n" -}}
                {{ .Annotations.description }}
                {{- "\n" -}}
              {{- end }}
              {{- if .Annotations.message }}
                {{- "\n" -}}
                {{ .Annotations.message }}
                {{- "\n" -}}
              {{- end }}
            {{- end }}
          {{- end }}
      ingress:
        annotations:
          external-dns.alpha.kubernetes.io/target: poptart-ingress.gangsterkitties.com
        hosts:
          - poptart-alertmanager.gangsterkitties.com
        tls:
          - hosts:
              - poptart-alertmanager.gangsterkitties.com
    grafana:
      ingress:
        annotations:
          external-dns.alpha.kubernetes.io/target: poptart-ingress.gangsterkitties.com
        hosts:
          - poptart-grafana.gangsterkitties.com
        tls:
          - hosts:
              - poptart-grafana.gangsterkitties.com
      # persistence:
      #   enabled: true
      #   size: 1Gi
      #   storageClassName: local-storage
      #   subPath: grafana
      #   volumeName: kps-grafana
      # initChownData:
      #   enabled: false
      sidecar:
        dashboards:
          enabled: true
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true
    kubeEtcd:
      endpoints:
        - 10.0.102.100
    kubeProxy:
      enabled: false
    prometheus:
      ingress:
        annotations:
          external-dns.alpha.kubernetes.io/target: poptart-ingress.gangsterkitties.com
        hosts:
          - poptart-prometheus.gangsterkitties.com
        tls:
          - hosts:
              - poptart-prometheus.gangsterkitties.com
      # prometheusSpec:
      #   storageSpec:
      #     volumeClaimTemplate:
      #       spec:
      #         resources:
      #           requests:
      #             storage: 20Gi
      #         storageClassName: local-storage
      #         volumeName: kps-prometheus
