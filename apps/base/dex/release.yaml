apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: dex
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: dex
      version: ">= 0.1.0"
      sourceRef:
        kind: HelmRepository
        name: dex
  values:
    configSecret:
      create: false
      name: dex-config
    rbac:
      create: false
    ingress:
      enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: kps
