---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: external-secrets
      version: "1.3.2"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kps
