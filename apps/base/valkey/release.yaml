---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: valkey
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: valkey
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: valkey
  driftDetection:
    mode: enabled
  values:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        extraLabels:
          release: kps
