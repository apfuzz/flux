---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway
  namespace: cilium
  annotations:
    external-dns.alpha.kubernetes.io/target: fivealive-gateway.gangsterkitties.com
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations: {}
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ''
            kind: Secret
            name: wildcard
            namespace: cert-manager
