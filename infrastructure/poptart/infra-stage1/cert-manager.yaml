---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  interval: 15m
  values:
    resources:
      limits:
        memory: 128Mi
      requests:
        memory: 128Mi
    webhook:
      resources:
        limits:
          memory: 64Mi
        requests:
          memory: 64Mi
    cainjector:
      resources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
