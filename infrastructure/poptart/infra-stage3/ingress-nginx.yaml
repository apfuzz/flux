---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  interval: 15m
  values:
    controller:
      ingressClassResource:
        default: true
      resources:
        requests:
          memory: 256Mi
        limits:
          memory: 256Mi
      service:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: poptart-ingress.gangsterkitties.com
          metallb.io/loadBalancerIPs: 10.0.102.251
