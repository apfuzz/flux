---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: default
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: podinfo
    namespace: flux-system
  values:
    ingress:
      className: cilium
      annotations:
        external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
      hosts:
        - host: podinfo.gangsterkitties.com
          paths:
            - path: /
              pathType: Prefix
