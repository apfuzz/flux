---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium
spec:
  interval: 15m
  values:
    resources:
      limits:
        memory: 384Mi
      requests:
        memory: 384Mi
    ingressController:
      service:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: fivealive-ingress.gangsterkitties.com
          metallb.io/loadBalancerIPs: 10.0.101.254
    envoy:
      resources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
    nodePort:
      enabled: true
    operator:
      resources:
        limits:
          memory: 256Mi
        requests:
          memory: 256Mi
