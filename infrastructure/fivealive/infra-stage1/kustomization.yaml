---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/infra-stage1/cert-manager
  - ../../base/infra-stage1/cloudnative-pg
  - ../../base/infra-stage1/external-dns
  - ../../base/infra-stage1/gateway-api
  - ../../base/infra-stage1/kps-crds
  - ../../base/infra-stage1/longhorn
  - ../../base/infra-stage1/metallb
  - ./kps
patches:
  - path: cert-manager.yaml
    target:
      kind: HelmRelease
      name: cert-manager
      namespace: cert-manager
  - path: cloudnative-pg.yaml
    target:
      kind: HelmRelease
      name: cloudnative-pg
      namespace: cnpg-system
  - path: external-dns.yaml
    target:
      kind: HelmRelease
      name: external-dns
      namespace: external-dns
  - path: longhorn.yaml
    target:
      kind: HelmRelease
      name: longhorn
      namespace: longhorn
  - path: metallb.yaml
    target:
      kind: HelmRelease
      name: metallb
      namespace: metallb-system
