---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  dependsOn:
    - name: kps-crds
      namespace: monitoring
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: external-dns
      version: "1.20.x"
      sourceRef:
        kind: HelmRepository
        name: external-dns
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kps
    policy: sync
    provider:
      name: rfc2136
    extraArgs:
      - --rfc2136-host=10.0.100.2
      - --rfc2136-port=53
      - --rfc2136-tsig-axfr
      - --rfc2136-tsig-secret-alg=hmac-sha256
      - --rfc2136-zone=gangsterkitties.com
    env:
      - name: EXTERNAL_DNS_IGNORE_INGRESS_TLS_SPEC
        value: "true"
      - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
        valueFrom:
          secretKeyRef:
            name: rfc2136-keys
            key: rfc2136-tsig-secret
      - name: EXTERNAL_DNS_RFC2136_TSIG_KEYNAME
        valueFrom:
          secretKeyRef:
            name: rfc2136-keys
            key: rfc2136-tsig-keyname
