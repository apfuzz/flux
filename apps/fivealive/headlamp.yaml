---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kube-system
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: headlamp
      version: ">= 0.1.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
  values:
    ingress:
      annotations:
        external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
      hosts:
        - host: headlamp.gangsterkitties.com
          paths:
            - path: /
              type: Prefix
      tls:
        - hosts:
            - headlamp.gangsterkitties.com
