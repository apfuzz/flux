---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium
spec:
  dependsOn:
    - name: kps-crds
      namespace: monitoring
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: cilium
      version: "1.18.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    resources:
      limits:
        memory: 384Mi
      requests:
        memory: 384Mi
    ingressController:
      service:
        annotations:
          metallb.io/loadBalancerIPs: 10.0.101.254
    envoy:
      resources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
    operator:
      resources:
        limits:
          memory: 256Mi
        requests:
          memory: 256Mi
