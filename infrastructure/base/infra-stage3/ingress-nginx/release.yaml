---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.14.*"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
  values:
    controller:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kps
      extraArgs:
        default-ssl-certificate: cert-manager/wildcard
