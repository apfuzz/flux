---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: podinfo
  values:
    httpRoute:
      enabled: true
      parentRefs:
        - name: cilium-gateway
          sectionName: https
          namespace: cilium
      hostnames:
        - podinfo.gangsterkitties.com
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
