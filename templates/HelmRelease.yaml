---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: CHART_NAME
spec:
  dependsOn:
    - name: SOME_HELM_RELEASE
  interval: 15m
  timeout: 5m
  # OCI source
  chartRef:
    kind: OCIRepository
    name: CHART_NAME
  # Helm source
  chart:
    spec:
      chart: CHART_NAME
      version: ">= 1.0.0"
      sourceRef:
        kind: HelmRepository
        name: REPO_NAME
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
