apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-bot-token
  namespace: flux-system
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: slack-bot-token
  data:
  - secretKey: token
    remoteRef:
      key: creds/slack
      property: fluxcd_token
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: slack-bot
  namespace: flux-system
spec:
  type: slack
  channel: argocd
  address: https://slack.com/api/chat.postMessage
  secretRef:
    name: slack-bot-token
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: flux-alert
  namespace: flux-system
spec:
  summary: "Flux CD Alert"
  eventMetadata:
    cluster: "talos"
  providerRef:
    name: slack-bot
  eventSeverity: info
  eventSources:
    # - kind: GitRepository
    #   name: '*'
    # - kind: HelmRepository
    #   name: '*'
    # - kind: HelmRelease
    #   name: '*'
    - kind: Kustomization
      name: '*'
