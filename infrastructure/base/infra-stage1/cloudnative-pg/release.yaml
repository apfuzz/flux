---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  dependsOn:
    - name: kps-crds
      namespace: monitoring
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.26.1"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    monitoring:
      podMonitorEnabled: true
      podMonitorAdditionalLabels:
        release: kps
      grafanaDashboard:
        create: true
