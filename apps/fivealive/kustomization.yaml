---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/dex
  - ../base/flux
  - ../base/headlamp
  - ../base/kps
  - ./dex
  - ./flux
  - ./kps
  - ./talos-etcd
patches:
  - path: dex.yaml
    target:
      kind: HelmRelease
      name: dex
      namespace: dex
  - path: flux.yaml
    target:
      kind: HelmRelease
      name: flux-operator
      namespace: flux-system
  - path: headlamp.yaml
    target:
      kind: HelmRelease
      name: headlamp
      namespace: kube-system
  - path: kps.yaml
    target:
      kind: HelmRelease
      name: kps
      namespace: monitoring
