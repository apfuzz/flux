---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/argocd
  - ../base/dex
  - ../base/external-secrets
  - ../base/flux
  - ../base/gitlab-runner
  - ../base/harbor
  - ../base/headlamp
  - ../base/kps
  - ../base/reloader
  - ../base/valkey
  - ../base/vault
  - ./dex
  - ./external-secrets
  - ./flux
  - ./kps
  - ./postgres
  - ./talos-etcd
  - ./vault
patches:

  ### helm release overrides

  - path: argocd.yaml
    target:
      kind: HelmRelease
      name: argocd
      namespace: argocd
  - path: dex.yaml
    target:
      kind: HelmRelease
      name: dex
      namespace: dex
  - path: external-secrets.yaml
    target:
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
  - path: flux.yaml
    target:
      kind: HelmRelease
      name: flux-operator
      namespace: flux-system
  - path: gitlab-runner.yaml
    target:
      kind: HelmRelease
      name: gitlab-runner
      namespace: gitlab
  - path: harbor.yaml
    target:
      kind: HelmRelease
      name: harbor
      namespace: harbor
  - path: headlamp.yaml
    target:
      kind: HelmRelease
      name: headlamp
      namespace: kube-system
  - path: kps.yaml
    target:
      kind: HelmRelease
      name: kps
      namespace: monitoring
  - path: reloader.yaml
    target:
      kind: HelmRelease
      name: reloader
      namespace: reloader
  - path: valkey.yaml
    target:
      kind: HelmRelease
      name: valkey
      namespace: valkey
  - path: vault.yaml
    target:
      kind: HelmRelease
      name: vault
      namespace: vault

  ### json patches

  # FluxInstance sync path

  - patch: |
      - op: replace
        path: /spec/sync/path
        value: "clusters/fivealive"
    target:
      kind: FluxInstance
      name: flux
      namespace: flux-system

  # Flux Slack alert username
  - patch: |
      - op: replace
        path: /spec/username
        value: "Flux - fivealive"
    target:
      kind: Provider
      name: slack-bot
      namespace: flux-system
