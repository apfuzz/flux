---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./flux
  - ../base/podinfo
  - ../base/headlamp
patches:
  - path: flux.yaml
    target:
      kind: HelmRelease
      name: flux-operator
      namespace: flux-system
  - path: podinfo.yaml
    target:
      kind: HelmRelease
      name: podinfo.yaml
      namespace: default
  - path: headlamp.yaml
    target:
      kind: HelmRelease
      name: headlamp
      namespace: kube-system
