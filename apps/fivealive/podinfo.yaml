---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: podinfo
  values:
    # ingress:
    #   enabled: true
    #   annotations:
    #     external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
    #   hosts:
    #     - host: podinfo.gangsterkitties.com
    #       paths:
    #         - path: /
    #           pathType: Prefix
    #   tls:
    #    - hosts:
    #        - podinfo.gangsterkitties.com
    httpRoute:
      enabled: true
      parentRefs:
        - name: cilium-gateway
          sectionName: https
          namespace: cilium
      hostnames:
        - podinfo.gangsterkitties.com
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
