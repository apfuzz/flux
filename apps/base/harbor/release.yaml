---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: harbor
      version: "1.18.0"
      sourceRef:
        kind: HelmRepository
        name: harbor
  driftDetection:
    mode: enabled
  values:
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: none
    harborAdminPassword: "Harbor12345"
    updateStrategy:
      type: Recreate
    metrics:
      enabled: true
    #   serviceMonitor:
    #     enabled: true
    #     additionalLabels:
    #       release: kps
    portal:
      image:
        repository: ghcr.io/octohelm/harbor/harbor-portal
    core:
      image:
        repository: ghcr.io/octohelm/harbor/harbor-core
    jobservice:
      image:
        repository: ghcr.io/octohelm/harbor/harbor-jobservice
    registry:
      registry:
        image:
          repository: ghcr.io/octohelm/harbor/registry-photon
      controller:
        image:
          repository: ghcr.io/octohelm/harbor/harbor-registryctl
    trivy:
      enabled: false
      image:
        repository: ghcr.io/octohelm/harbor/trivy-adapter-photon
    exporter:
      image:
        repository: ghcr.io/octohelm/harbor/harbor-exporter
