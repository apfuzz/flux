apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: gitea
      version: "12.5.0"
      sourceRef:
        kind: HelmRepository
        name: gitea
  values:
    service:
      ssh:
        type: LoadBalancer
        annotations: {}
    ingress:
      enabled: true
      className: cilium
      annotations: {}
      hosts:
        - host: gitea.gangsterkitties.com
          paths:
            - path: /
      tls:
      - hosts:
          - gitea.gangsterkitties.com
    resources: {}
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
    persistence:
      claimName: gitea-shared-storage
      size: 10Gi
      storageClass: longhorn
    gitea:
      admin:
        existingSecret: gitea-admin-secret
        email: "gitea@local.domain"
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kps
      ldap:
        - name: LDAP
          securityProtocol: ldaps
          host: ldap.gangsterkitties.com
          port: 636
          existingSecret: gitea-ldap-secret
          userSearchBase: cn=users,dc=gangsterkitties,dc=com
          userFilter: (&(objectClass=posixAccount)(uid=%[1]s))
          adminFilter: (memberOf=cn=admins,cn=groups,dc=gangsterkitties,dc=com)
          emailAttribute: mail
          usernameAttribute: uid
      config:
        server:
          SSH_DOMAIN: git-ssh.gangsterkitties.com
        database:
          DB_TYPE: postgres
          HOST: postgres-talos-rw.postgres:5432
          NAME: gitea
          USER: gitea
          SSL_MODE: require
      additionalConfigFromEnvs:
        - name: GITEA__CACHE__HOST
          value: redis://valkey.valkey.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: gitea-postgres-secret
              key: password
    valkey-cluster:
      enabled: false
    valkey:
      enabled: false
    postgresql-ha:
      enabled: false
