---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./flux
  - ../base/podinfo
  - ../base/headlamp
patches:
  - path: flux.yaml
    target:
      kind: HelmRelease
  - path: podinfo.yaml
    target:
      kind: HelmRelease
  - path: headlamp.yaml
    target:
      kind: HelmRelease
