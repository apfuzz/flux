---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-test
  namespace: vault-test
spec:
  interval: 15m
  values:
    server:
      resources:
        requests:
          memory: 256Mi
        limits:
          memory: 256Mi
      ingress:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
        hosts:
          - host: vault-test.gangsterkitties.com
        tls:
          - hosts:
              - vault-test.gangsterkitties.com
