apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab
  namespace: argocd
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: git@gitlab.com:gangsterkitties/argocd.git
        sshPrivateKey: |
          {{ .argocd_private_key }}
  data:
  - secretKey: argocd_private_key
    remoteRef:
      key: creds/gitlab
      property: argocd_private_key
