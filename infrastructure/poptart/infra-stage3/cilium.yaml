---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium
spec:
  interval: 15m
  chart:
    spec:
      version: "1.19.x"
  values:
    k8sServiceHost: localhost
    k8sServicePort: 7445
    ingressController:
      service:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: poptart-ingress.gangsterkitties.com
          metallb.io/loadBalancerIPs: 10.0.102.252
    kubeProxyReplacement: true
