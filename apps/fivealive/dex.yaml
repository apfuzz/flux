apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
spec:
  interval: 15m
  values:
    ingress:
      className: cilium
      annotations:
        external-dns.alpha.kubernetes.io/target: fivealive-ingress.gangsterkitties.com
      hosts:
        - host: dex.gangsterkitties.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - dex.gangsterkitties.com
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 32Mi
